[tool.black]
line-length = 120
target-version = ['py312']
include = '\.pyi?$'

[tool.ruff]
target-version = "py312"
line-length = 120
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "B008",  # Do not perform function calls in argument defaults (FastAPI depends on this)
    "B904",  # raise ... from inside except clauses (standard exception wraps)
    "UP046", # Generic class uses Generic subclass instead of type parameters
    "F821",  # Undefined name (SQLAlchemy relationship strings e.g. Mapped["User"])
    "E501",  # Line too long (to support large raw prompt blocks)
]

[tool.ruff.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
